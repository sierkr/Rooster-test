# CI-workflow (v3.31.0, fase 4).
# Draait automatisch bij elke push (dus ook bij upload via de GitHub-website).
name: Tests

on:
  push:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit-tests (rekenlogica)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Draai unit-tests
        run: node --test tests/unit/*.test.mjs

  rules-tests:
    name: Firestore rules-tests (emulator)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Installeer firebase-tools
        run: npm install -g firebase-tools
      - name: Installeer test-afhankelijkheden
        run: npm install
        working-directory: tests/rules
      - name: Draai rules-tests tegen de emulator
        run: npm test
        working-directory: tests/rules
